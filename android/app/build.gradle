apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

// Load .env file via react-native-config
apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"

react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = true
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.krushimandi.app"

    defaultConfig {
        applicationId "com.krushimandi.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 5
        versionName "1.0"

        externalNativeBuild {
            cmake {
                arguments "-DCMAKE_BUILD_TYPE=Release"
            }
        }
    }

    signingConfigs {
        debug {
            // Priority: System env var > .env file
            storeFile file(System.getenv("DEBUG_STORE_FILE") ?: project.env.get("DEBUG_STORE_FILE"))
            storePassword System.getenv("DEBUG_STORE_PASSWORD") ?: project.env.get("DEBUG_STORE_PASSWORD")
            keyAlias System.getenv("DEBUG_KEY_ALIAS") ?: project.env.get("DEBUG_KEY_ALIAS")
            keyPassword System.getenv("DEBUG_KEY_PASSWORD") ?: project.env.get("DEBUG_KEY_PASSWORD")
        }

        release {
            // Priority: System env var > .env file
            storeFile file(System.getenv("RELEASE_STORE_FILE") ?: project.env.get("RELEASE_STORE_FILE"))
            storePassword System.getenv("RELEASE_STORE_PASSWORD") ?: project.env.get("RELEASE_STORE_PASSWORD")
            keyAlias System.getenv("RELEASE_KEY_ALIAS") ?: project.env.get("RELEASE_KEY_ALIAS")
            keyPassword System.getenv("RELEASE_KEY_PASSWORD") ?: project.env.get("RELEASE_KEY_PASSWORD")
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            ndk {
                debugSymbolLevel 'none'
            }
        }

        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'

            ndk {
                debugSymbolLevel 'none'
            }
        }
    }

    packagingOptions {
        
        jniLibs.useLegacyPackaging = true

        resources {
            excludes += ["META-INF/**"]
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("androidx.core:core:1.13.1")
    implementation 'com.google.firebase:firebase-appcheck-playintegrity'
    implementation platform('com.google.firebase:firebase-bom:32.2.0')

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android:0.74.0")
    } else {
        implementation jscFlavor
    }
}